version: 2

project_name: etoro

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: etoro
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/marianopa-tr/etoro-cli/cmd.version={{.Version}}
      - -X github.com/marianopa-tr/etoro-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/marianopa-tr/etoro-cli/cmd.date={{.Date}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
